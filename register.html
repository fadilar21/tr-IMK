<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — Valkyrie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   VALKYRIE — Gaming Gear UI
   Design tokens
   ========================================================= */
:root{
  --bg-void: #07040f;
  --bg-panel: rgba(20, 12, 36, 0.55);
  --bg-panel-solid: #150c26;
  --purple-500: #7c3aed;
  --purple-400: #a855f7;
  --pink-500: #ec4899;
  --pink-400: #f472b6;
  --grad-brand: linear-gradient(135deg, var(--purple-500) 0%, var(--pink-500) 100%);
  --text-hi: #f6f3ff;
  --text-mid: #c7bcdd;
  --text-low: #8b7fa8;
  --border-soft: rgba(168, 85, 247, 0.25);
  --glow-purple: 0 0 24px rgba(124, 58, 237, 0.55);
  --glow-pink: 0 0 24px rgba(236, 72, 153, 0.45);
  --radius-lg: 22px;
  --radius-md: 14px;
  --radius-sm: 8px;
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
}

*{ box-sizing: border-box; }

html, body{
  height: 100%;
}

body{
  margin: 0;
  background: var(--bg-void);
  color: var(--text-hi);
  font-family: var(--font-body);
  font-size: 1.05rem;
  overflow-x: hidden;
}

a{ text-decoration: none; }

/* ---------------------------------------------------------
   Reusable background layer
   --------------------------------------------------------- */
.bg-scene{
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(180deg, rgba(7,4,15,0.55) 0%, rgba(7,4,15,0.85) 55%, #07040f 100%),
    url('../assets/bg.png');
  background-size: cover;
  background-position: center;
  animation: bgDrift 30s ease-in-out infinite alternate;
}

@keyframes bgDrift{
  0%   { background-position: center 0%; }
  100% { background-position: center 4%; }
}

.bg-glow{
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(600px 400px at 15% 20%, rgba(124,58,237,0.18), transparent 60%),
    radial-gradient(500px 380px at 85% 75%, rgba(236,72,153,0.16), transparent 60%);
}

/* ---------------------------------------------------------
   Brand / logo
   --------------------------------------------------------- */
.brand{
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.brand img{
  height: 42px;
  filter: drop-shadow(0 0 10px rgba(168,85,247,0.7));
  animation: floatY 4s ease-in-out infinite;
}

.brand-name{
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.6rem;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #ffffff, var(--purple-400) 60%, var(--pink-500));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

@keyframes floatY{
  0%, 100% { transform: translateY(0px); }
  50%      { transform: translateY(-6px); }
}

/* ---------------------------------------------------------
   Fade / rise entrance animations
   --------------------------------------------------------- */
.fade-up{
  opacity: 0;
  transform: translateY(24px);
  animation: fadeUp .7s ease forwards;
}
@keyframes fadeUp{
  to{ opacity: 1; transform: translateY(0); }
}
.delay-1{ animation-delay: .12s; }
.delay-2{ animation-delay: .24s; }
.delay-3{ animation-delay: .36s; }
.delay-4{ animation-delay: .48s; }
.delay-5{ animation-delay: .6s; }

/* ---------------------------------------------------------
   Glass card (login / register)
   --------------------------------------------------------- */
.glass-card{
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  padding: 2.2rem 2rem;
}

.form-label-vk{
  font-size: .8rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: .35rem;
  display: block;
}

.input-vk{
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(168,85,247,0.28);
  border-radius: var(--radius-sm);
  padding: .7rem .9rem;
  color: var(--text-hi);
  font-family: var(--font-body);
  font-size: 1rem;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
}
.input-vk::placeholder{ color: var(--text-low); }
.input-vk:focus{
  outline: none;
  border-color: var(--purple-400);
  background: rgba(124,58,237,0.08);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
}

.input-group-vk{ position: relative; }
.toggle-eye{
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-low);
  font-size: .85rem;
  user-select: none;
  transition: color .2s ease;
}
.toggle-eye:hover{ color: var(--purple-400); }

/* ---------------------------------------------------------
   Buttons
   --------------------------------------------------------- */
.btn-vk{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  width: 100%;
  border: none;
  border-radius: 999px;
  padding: .8rem 1.6rem;
  font-family: var(--font-display);
  font-size: .8rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #fff;
  background: var(--grad-brand);
  background-size: 200% 100%;
  background-position: 0% 0%;
  box-shadow: var(--glow-purple);
  transition: background-position .5s ease, transform .18s ease, box-shadow .3s ease;
  cursor: pointer;
}
.btn-vk:hover{
  background-position: 100% 0%;
  transform: translateY(-2px);
  box-shadow: var(--glow-purple), var(--glow-pink);
  color: #fff;
}
.btn-vk:active{ transform: translateY(0px) scale(.98); }

.btn-vk .arrow{ transition: transform .25s ease; }
.btn-vk:hover .arrow{ transform: translateX(5px); }

.btn-outline-vk{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  width: 100%;
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 999px;
  padding: .65rem 1.4rem;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: .92rem;
  color: var(--text-hi);
  background: rgba(255,255,255,0.03);
  transition: all .25s ease;
}
.btn-outline-vk:hover{
  border-color: var(--purple-400);
  background: rgba(124,58,237,0.12);
  color: #fff;
}

.link-vk{
  color: var(--purple-400);
  font-weight: 600;
  transition: color .2s ease;
}
.link-vk:hover{ color: var(--pink-400); }

.divider-vk{
  display: flex;
  align-items: center;
  gap: .8rem;
  color: var(--text-low);
  font-size: .8rem;
  margin: 1.1rem 0;
}
.divider-vk::before, .divider-vk::after{
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

.splash-wrap{
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 1rem;
}

.splash-wrap .brand img{ height: 110px; }
.splash-wrap .brand-name{ font-size: 2.4rem; letter-spacing: 8px; }

.splash-tagline{
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(2rem, 6vw, 3.4rem);
  line-height: 1.15;
  margin: 1.6rem 0 .8rem;
  text-shadow: 0 0 30px rgba(124,58,237,0.5);
}

.splash-sub{
  color: var(--text-mid);
  max-width: 460px;
  margin: 0 auto 2.2rem;
  font-size: 1.05rem;
}

.splash-wrap .btn-vk{ width: auto; padding: .9rem 2.4rem; }

.auth-wrap{
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 1rem;
}

.auth-card{ width: 100%; max-width: 420px; }
.auth-card.register{ max-width: 460px; }

.auth-title{
  font-family: var(--font-display);
  font-size: 1.15rem;
  letter-spacing: .06em;
  text-align: center;
  margin: 1.2rem 0 .2rem;
}
.auth-sub{
  text-align: center;
  color: var(--text-low);
  font-size: .9rem;
  margin-bottom: 1.6rem;
}

.vk-navbar{
  background: rgba(10, 6, 20, 0.75);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
  position: sticky;
  top: 0;
  z-index: 50;
}
.vk-navbar .nav-link-vk{
  color: var(--text-mid);
  font-weight: 600;
  font-size: .92rem;
  padding: .4rem .9rem;
  border-radius: 999px;
  transition: all .2s ease;
}
.vk-navbar .nav-link-vk:hover,
.vk-navbar .nav-link-vk.active{
  color: #fff;
  background: rgba(124,58,237,0.18);
}

.search-vk{
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(168,85,247,0.25);
  border-radius: 999px;
  padding: .5rem 1.1rem;
  color: var(--text-hi);
  font-size: .9rem;
}
.search-vk::placeholder{ color: var(--text-low); }
.search-vk:focus{ outline: none; border-color: var(--purple-400); }

.icon-btn-vk{
  width: 40px; height: 40px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(168,85,247,0.2);
  color: var(--text-hi);
  transition: all .2s ease;
  position: relative;
}
.icon-btn-vk:hover{ background: rgba(124,58,237,0.2); border-color: var(--purple-400); }
.icon-btn-vk .badge-vk{
  position: absolute;
  top: -4px; right: -4px;
  background: var(--pink-500);
  color: #fff;
  font-size: .62rem;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* Sidebar */
.vk-sidebar{
  background: rgba(15, 9, 28, 0.6);
  border-right: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  padding: 1rem .6rem;
}
.vk-sidebar .side-link{
  display: flex;
  align-items: center;
  gap: .7rem;
  padding: .65rem .9rem;
  border-radius: var(--radius-sm);
  color: var(--text-mid);
  font-weight: 600;
  font-size: .92rem;
  margin-bottom: .3rem;
  transition: all .2s ease;
}
.vk-sidebar .side-link:hover{ background: rgba(255,255,255,0.05); color: #fff; }
.vk-sidebar .side-link.active{
  background: var(--grad-brand);
  color: #fff;
  box-shadow: var(--glow-purple);
}

/* Hero banner */
.hero-banner{
  border-radius: var(--radius-lg);
  background:
    linear-gradient(120deg, rgba(10,6,22,0.92) 20%, rgba(10,6,22,0.35) 60%),
    url('../assets/bg.png');
  background-size: cover;
  background-position: center;
  padding: 2.4rem;
  position: relative;
  overflow: hidden;
  min-height: 260px;
  display: flex;
  align-items: center;
}
.hero-banner::after{
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(400px 260px at 80% 40%, rgba(236,72,153,0.18), transparent 70%);
}
.hero-eyebrow{
  color: var(--pink-400);
  font-weight: 700;
  letter-spacing: .08em;
  font-size: .85rem;
  text-transform: uppercase;
}
.hero-title{
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  line-height: 1.15;
  margin: .4rem 0 .3rem;
}
.hero-title .accent{
  background: var(--grad-brand);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-banner .btn-vk{ width: auto; padding: .75rem 1.8rem; margin-top: 1rem; }

.cat-pill{
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(168,85,247,0.2);
  border-radius: var(--radius-md);
  text-align: center;
  padding: .9rem .5rem;
  color: var(--text-mid);
  font-weight: 600;
  font-size: .82rem;
  transition: all .25s ease;
  display: block;
}
.cat-pill i{ display:block; font-size: 1.3rem; margin-bottom: .4rem; color: var(--purple-400); }
.cat-pill:hover{
  transform: translateY(-4px);
  border-color: var(--purple-400);
  color: #fff;
  box-shadow: var(--glow-purple);
}

.product-card{
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(168,85,247,0.18);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  height: 100%;
}
.product-card:hover{
  transform: translateY(-6px);
  border-color: var(--purple-400);
  box-shadow: 0 14px 30px rgba(0,0,0,0.4), var(--glow-purple);
}
.product-thumb{
  height: 150px;
  background-size: cover;
  background-position: center;
  position: relative;
}
.product-thumb .discount-tag{
  position: absolute;
  top: 10px; left: 10px;
  background: var(--pink-500);
  color: #fff;
  font-size: .7rem;
  font-weight: 700;
  padding: .2rem .55rem;
  border-radius: 999px;
}
.product-body{ padding: .9rem 1rem 1.1rem; }
.product-name{ font-weight: 700; font-size: .95rem; margin-bottom: .2rem; }
.product-price{ color: var(--purple-400); font-weight: 700; }
.product-price .old{
  color: var(--text-low);
  text-decoration: line-through;
  font-weight: 500;
  font-size: .85rem;
  margin-left: .4rem;
}

.reveal{
  opacity: 0;
  transform: translateY(30px);
  transition: opacity .6s ease, transform .6s ease;
}
.reveal.in-view{
  opacity: 1;
  transform: translateY(0);
}

::-webkit-scrollbar{ width: 8px; }
::-webkit-scrollbar-track{ background: var(--bg-void); }
::-webkit-scrollbar-thumb{ background: var(--purple-500); border-radius: 8px; }

@media (max-width: 767px){
  .vk-sidebar{ display: none; }
}

</style>
</head>
<body>

<div class="bg-scene"></div>
<div class="bg-glow"></div>

<main class="auth-wrap">
  <div class="auth-card register fade-up">

    <div class="brand">
      <img src="assets/logo.png" alt="Valkyrie logo" style="height:56px;">
    </div>
    <div class="brand-name" style="text-align:center; margin-top:.4rem;">VALKYRIE</div>

    <div class="glass-card mt-4 fade-up delay-1">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-sub">Gabung dan mulai upgrade setup gaming-mu</p>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label-vk" for="regName">Nama Lengkap</label>
          <input type="text" class="input-vk" id="regName" placeholder="Nama kamu" required>
        </div>

        <div class="mb-3">
          <label class="form-label-vk" for="regEmail">Email</label>
          <input type="email" class="input-vk" id="regEmail" placeholder="you@email.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label-vk" for="regUsername">Username</label>
          <input type="text" class="input-vk" id="regUsername" placeholder="gamertag_kamu" required>
        </div>

        <div class="mb-3">
          <label class="form-label-vk" for="regPass">Password</label>
          <div class="input-group-vk">
            <input type="password" class="input-vk" id="regPass" placeholder="Minimal 8 karakter" minlength="8" required>
            <span class="toggle-eye" data-target="regPass"><i class="fa-regular fa-eye"></i></span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label-vk" for="regPass2">Konfirmasi Password</label>
          <div class="input-group-vk">
            <input type="password" class="input-vk" id="regPass2" placeholder="Ulangi password" required>
            <span class="toggle-eye" data-target="regPass2"><i class="fa-regular fa-eye"></i></span>
          </div>
          <small id="matchMsg" style="display:none; color:var(--pink-400); font-size:.78rem;">Password tidak sama</small>
        </div>

        <label class="d-flex align-items-start gap-2 mb-3" style="color:var(--text-mid); font-size:.85rem; cursor:pointer;">
          <input type="checkbox" required style="accent-color:var(--purple-500); margin-top:.25rem;">
          Saya setuju dengan <a href="#" class="link-vk">Syarat & Ketentuan</a>
        </label>

        <button type="submit" class="btn-vk">
          Create Account <i class="fa-solid fa-arrow-right arrow"></i>
        </button>
      </form>

      <p class="text-center mt-4" style="color:var(--text-low); font-size:.9rem;">
        Sudah punya akun? <a href="login.html" class="link-vk">Login di sini</a>
      </p>
    </div>
  </div>
</main>

<script>
  document.querySelectorAll('.toggle-eye').forEach(function (el) {
    el.addEventListener('click', function () {
      const input = document.getElementById(this.dataset.target);
      const icon = this.querySelector('i');
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    });
  });

  const form = document.getElementById('registerForm');
  const pass1 = document.getElementById('regPass');
  const pass2 = document.getElementById('regPass2');
  const matchMsg = document.getElementById('matchMsg');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const passwordsMatch = pass1.value === pass2.value && pass1.value.length > 0;
    matchMsg.style.display = passwordsMatch ? 'none' : 'block';

    if (!form.checkValidity() || !passwordsMatch) {
      form.classList.add('was-validated');
      return;
    }

    const btn = form.querySelector('.btn-vk');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Membuat akun...';
    btn.style.pointerEvents = 'none';
    setTimeout(() => {
      btn.innerHTML = originalHTML;
      btn.style.pointerEvents = 'auto';
      window.location.href = 'login.html';
    }, 1100);
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
