<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VALKYRIE Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


<img src="bg all.png" class="background-image">
<nav class="navbar navbar-expand-lg px-4 py-3">
    <img src="namalogo.png"
    class="valkyrie-logo">
    <div class="ms-auto d-flex align-items-center nav-icons">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <img src="profile.png"
        class="top-profile">
        <i class="fa-solid fa-xmark"></i>
    </div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- LEFT -->
<div class="col-lg-3">
<div class="side-panel">
<div class="info-box">
<p>MEMBER<br>-ELITE-</p>
<img src="logo.png">
<div class="progress-text">
XP PROGRESS
</div>
<h3>1.259/2.000</h3>
</div>

<div class="menu-stat">
<i class="fa-regular fa-clipboard"></i>
<div>
ORDERS
<h3>23</h3>
</div>
</div>

<div class="menu-stat">
<i class="fa-regular fa-heart"></i>
<div>
WISHLIST
<h3>4</h3>
</div>
</div>

<div class="menu-stat">
<i class="fa-regular fa-copyright"></i>
<div>
VCOINS
<h3>1.359</h3>
</div>
</div>

<div class="menu-stat">
<i class="fa-regular fa-star"></i>
<div>
REVIEWS
<h3>18</h3>
</div>
</div>

</div>
</div>

<!-- RIGHT -->

<div class="col-lg-9">
<h1 class="profile-title">
My Profile
</h1>
<div class="profile-header">
<img src="mail.png"
class="profile-pic">
<div>
<h2>
Ismail Bin Mael
</h2>
<p></p>
maelgantenganjaymabar@gmail.com
</p>

<span class="member-badge">
Member 👑
</span>
</div>
</div>
<div class="profile-menu">
<div class="menu-item">
<span><i class="fa-regular fa-clipboard"></i> My Orders</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item">
<span><i class="fa-solid fa-house"></i> Home</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item">
<span><i class="fa-regular fa-credit-card"></i> Payment Methods</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item">
<span><i class="fa-solid fa-gear"></i> Settings</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item">
<span><i class="fa-regular fa-bell"></i> Notifications</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item">
<span><i class="fa-regular fa-circle-question"></i> Help & Support</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

<div class="menu-item logout">
<span><i class="fa-solid fa-right-from-bracket"></i> Log Out</span>
<i class="fa-solid fa-chevron-right"></i>
</div>

</div>

</div>

</div>

</div>

<script>

const items = document.querySelectorAll(".menu-item");

items.forEach(item=>{

item.addEventListener("mouseenter",()=>{

item.style.transform="translateX(10px)";

});

item.addEventListener("mouseleave",()=>{

item.style.transform="translateX(0px)";

});

});

</script>

</body>
</html>
