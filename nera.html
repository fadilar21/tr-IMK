<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valkyrie — Level Up Your Game</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-scene"></div>
<div class="bg-glow"></div>

<main class="splash-wrap">
  <div class="brand fade-up">
    <img src="assets/logo.png" alt="Valkyrie logo">
  </div>
  <div class="brand-name fade-up delay-1">VALKYRIE</div>

  <h1 class="splash-tagline fade-up delay-2">LEVEL UP<br>YOUR GAME</h1>
  <p class="splash-sub fade-up delay-3">Premium Gaming Gear<br>For True Gamers</p>

  <a href="login.html" class="btn-vk fade-up delay-4" id="getStartedBtn">
    Get Started <i class="fa-solid fa-arrow-right arrow"></i>
  </a>
</main>

<script>
  // Halus: efek klik sebelum pindah halaman (page-transition kecil)
  const btn = document.getElementById('getStartedBtn');
  btn.addEventListener('click', function (e) {
    e.preventDefault();
    document.body.style.transition = 'opacity .35s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = this.getAttribute('href'); }, 320);
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
