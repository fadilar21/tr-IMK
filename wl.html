<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valkyrie - Wishlist Neon</title>
    <style>
        /* === RESET & VARIABEL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-main: #0b0d14;
            --bg-sidebar: #0b0d14;
            --bg-card: #151823;
            --bg-card-img: linear-gradient(180deg, #162235 0%, #1c2a42 100%);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --accent-purple: #7a3aed;
            --accent-purple-hover: #5d25c2;
            --badge-new: #7a3aed;
            --badge-discount: #3d1c29;
            --text-discount: #ff3b5c;
            --border-color: #2a2e3f;
            --star-color: #ffb800;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* === EFEK NEON DI OUTLINE PALING LUAR WEB === */
        .web-outline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none; /* Klik tembus ke elemen di bawahnya */
            z-index: 9999; /* Selalu berada di paling atas */
            
            /* Garis Gradasi Pinggir */
            border: 4px solid transparent;
            border-image: linear-gradient(135deg, #d300ff 0%, #00e5ff 100%) 1;
            
            /* Cahaya (Glow) yang memancar ke dalam halaman */
            box-shadow: inset 0 0 25px rgba(211, 0, 255, 0.4),
                        inset 0 0 50px rgba(0, 229, 255, 0.2);
        }

        /* === LAYOUT === */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            height: 100%;
            overflow-y: auto;
            z-index: 10;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Styling baru untuk logo gambar utama */
        .brand-logo-img {
            width: 100px;
            height: auto;
            max-height: 100px;
            object-fit: contain;
            margin-bottom: 12px;
            /* Memberikan efek glow tipis di sekitar logo transparan */
            filter: drop-shadow(0 0 8px rgba(122, 58, 237, 0.6));
            transition: filter 0.3s ease;
        }

        .brand-logo:hover .brand-logo-img {
            filter: drop-shadow(0 0 15px rgba(122, 58, 237, 0.9));
        }

        .brand-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .nav-item:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: rgba(122, 58, 237, 0.2);
            color: #b68aff;
        }

        .sidebar-bottom-logo {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
            filter: drop-shadow(0 0 15px rgba(122, 58, 237, 0.5));
        }

        /* === MAIN CONTENT === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
            overflow-y: auto;
            padding: 30px 40px;
        }

        .main-content::after {
            content: "";
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 600px;
            height: 600px;
            background-image: url("logo.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom right;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* === HEADER === */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 40px;
            z-index: 10;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .header-icons svg, .header-icons img {
            width: 24px;
            height: 24px;
            cursor: pointer;
            fill: white;
            transition: transform 0.2s, filter 0.2s;
        }

        .header-icons svg:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px var(--accent-purple));
        }

        .profile-pic {
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .profile-pic:hover {
            border-color: var(--accent-purple);
        }

        /* === WISHLIST SECTION === */
        .content-inner {
            z-index: 1;
        }

        .page-title {
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* === PRODUCT GRID === */
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .product-card {
            width: 280px;
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(122, 58, 237, 0.15);
            border-color: rgba(122, 58, 237, 0.4);
        }

        /* State ketika produk dihapus */
        .product-card.fade-out {
            opacity: 0;
            transform: scale(0.9) translateY(10px);
        }

        .card-image {
            height: 180px;
            background: var(--bg-card-img);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }

        .badge.new { background-color: var(--badge-new); }
        .badge.top-pick { background-color: var(--accent-purple); }

        .btn-heart {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(11, 13, 20, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-heart:hover {
            transform: scale(1.1);
            background: rgba(11, 13, 20, 0.9);
            border-color: #ff3b5c;
        }

        .btn-heart svg {
            width: 16px;
            height: 16px;
            fill: #ff3b5c;
            transition: transform 0.1s ease;
        }

        .btn-heart:active svg {
            transform: scale(0.8);
        }

        .card-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .brand-name {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--star-color);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .price {
            color: #b68aff;
            font-weight: 700;
            font-size: 14px;
        }

        .discount-badge {
            background-color: var(--badge-discount);
            color: var(--text-discount);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        /* === TOAST NOTIFIKASI NEON === */
        .toast-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10000;
        }

        .toast {
            background: #151823;
            color: #fff;
            padding: 14px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-purple);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3), 0 0 10px rgba(122, 58, 237, 0.2);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            min-width: 250px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.danger {
            border-left-color: #ff3b5c;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3), 0 0 10px rgba(255, 59, 92, 0.15);
        }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Inisialisasi & Query Selector
            const navItems = document.querySelectorAll('.nav-item');
            const heartButtons = document.querySelectorAll('.btn-heart');
            const wishlistCountEl = document.getElementById('wishlist-count');
            const productGrid = document.getElementById('product-grid');
            const toastContainer = document.getElementById('toast-container');

            // 2. Fungsi Pembuat Toast Neon Pop-up
            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.classList.add('toast');
                if (type === 'danger') toast.classList.add('danger');
                
                toast.innerHTML = `
                    <span>${message}</span>
                    <span style="cursor:pointer; opacity:0.6;" onclick="this.parentElement.remove()">✕</span>
                `;
                
                toastContainer.appendChild(toast);
                
                // Triger transisi masuk
                setTimeout(() => toast.classList.add('show'), 10);
                
                // Hapus toast otomatis setelah 3.5 detik
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3500);
            }

            // 3. Logika Menghapus Item dari Wishlist (Tombol Hati)
            heartButtons.forEach(button => {
                button.addEventListener('click', (e) => {
                    e.stopPropagation(); // Menghindari event bubbling
                    
                    const card = button.closest('.product-card');
                    const productName = card.querySelector('.product-name').textContent;
                    
                    // Trigger animasi fade-out
                    card.classList.add('fade-out');
                    
                    // Hapus elemen asli setelah transisi selesai
                    setTimeout(() => {
                        card.remove();
                        
                        // Update angka hitungan wishlist di header judul
                        const currentCards = document.querySelectorAll('.product-card');
                        wishlistCountEl.textContent = currentCards.length;
                        
                        // Munculkan notifikasi penghapusan
                        showToast(`"${productName}" berhasil dihapus dari Wishlist.`, 'danger');
                        
                        // Tampilan placeholder jika wishlist kosong
                        if (currentCards.length === 0) {
                            productGrid.innerHTML = `
                                <div style="width: 100%; text-align: center; padding: 50px 0; color: var(--text-muted);">
                                    <p style="font-size: 16px; margin-bottom: 10px;">Wishlist kamu kosong.</p>
                                    <small>Jelajahi toko untuk menambahkan item baru!</small>
                                </div>
                            `;
                        }
                    }, 400); 
                });
            });

            // 4. Sidebar Menu Active Switcher
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Menghilangkan kelas aktif dari semua menu
                    navItems.forEach(nav => nav.classList.remove('active'));
                    
                    // Menambahkan kelas aktif ke menu yang baru diklik
                    item.classList.add('active');
                    
                    const menuText = item.textContent.trim();
                    showToast(`Beralih ke halaman: ${menuText}`);
                });
            });

            // 5. Interaksi pada Tombol Header
            document.getElementById('btn-search').addEventListener('click', () => {
                showToast('Membuka panel pencarian...');
            });

            document.getElementById('btn-cart').addEventListener('click', () => {
                showToast('Mengarahkan ke keranjang belanja Anda...');
            });

            document.getElementById('btn-profile').addEventListener('click', () => {
                showToast('Membuka pengaturan profil Valkyrie.');
            });

            document.getElementById('btn-close').addEventListener('click', () => {
                showToast('Aksi Keluar/Kembali dipicu.', 'danger');
            });
        });
    </script>
</body>
</html>
