<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valkyrie Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="bg-overlay"></div>

        <div class="card login-card text-center">
            
            <div class="logo-container mb-4">
                <img src="logo.png" alt="Valkyrie Logo">
                <h2 class="brand-name text-uppercase fw-bold tracking-widest m-0">Valkyrie</h2>
            </div>

            <div class="mb-4 text-center">
                <h4 class="text-white fw-semibold mb-1">Welcome Back!</h4>
                <p class="text-cyber-muted small m-0">Sign in to continue to your account</p>
            </div>

            <form>
                <div class="mb-3 text-start">
                    <label class="form-label text-cyber-muted small mb-1">Email</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control-cyber" placeholder="you@email.com" required>
                    </div>
                </div>

                <div class="mb-2 text-start">
                    <label class="form-label text-cyber-muted small mb-1">Password</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control-cyber" placeholder="••••••••" required>
                        <span class="input-icon-end"><i class="bi bi-eye text-cyber-muted"></i></span>
                    </div>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="forgot-link text-decoration-none">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-login w-100 text-white mb-3">Login</button>
            </form>

            <div class="separator my-3">OR</div>

            <div class="d-flex flex-column gap-2 mb-4">
                <button class="btn btn-sso d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google"></i> Continue with Google
                </button>
                <button class="btn btn-sso d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-discord"></i> Continue with Discord
                </button>
            </div>

            <p class="text-cyber-muted small mb-0">
                Don't have an account? <a href="#" class="signup-link text-decoration-none fw-semibold">Sign up</a>
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
