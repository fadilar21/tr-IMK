<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VALKYRIE - Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="reviewproduct.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<img src="bg all.png" class="background-image">

<nav class="navbar navbar-expand-lg px-4 py-3">

    <img src="namalogo.png"
         alt="VALKYRIE"
         class="valkyrie-logo">

    <div class="ms-auto nav-icons">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <img src="mail.png"
             class="profile-avatar">
        <i class="fa-solid fa-xmark"></i>
    </div>

</nav>
<div class="container review-container">

    <h2 class="page-title">
        Write a Review
    </h2>

    <!-- Product Card -->

    <div class="product-card fade-up">

        <img src="item Razer BlackWidow V3.png"
             class="product-image">

        <div>

            <h5 class="product-name">
                Review Blackwidow V3
            </h5>

            <p class="product-price">
                Rp. 1.500.000
            </p>

            <span class="rating-label">
                Your Rating
            </span>

            <div class="stars">

                <i class="fa-solid fa-star active"></i>
                <i class="fa-solid fa-star active"></i>
                <i class="fa-solid fa-star active"></i>
                <i class="fa-solid fa-star active"></i>
                <i class="fa-solid fa-star active"></i>

            </div>

        </div>

    </div>

    <!-- Review -->

    <h3 class="section-title">
        Your Review
    </h3>

    <textarea
        class="review-box"
        placeholder="Text here..."></textarea>

    <!-- Photos -->

    <div class="photo-header">

        <h3 class="section-title m-0">
            Add Photos
        </h3>

        <span>(Optional)</span>

    </div>

    <div class="photo-area">

        <img src="item PC Full Set.png" class="review-photo">

        <img src="item Razer Kraken.png" class="review-photo">

        <button class="add-btn">
            <i class="fa-solid fa-plus"></i>
        </button>

    </div>

    <button class="submit-btn">
        Submit Review
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const stars = document.querySelectorAll('.stars i');

stars.forEach((star,index)=>{

    star.addEventListener('click',()=>{

        stars.forEach((s,i)=>{

            if(i <= index){
                s.classList.add('active');
            }else{
                s.classList.remove('active');
            }

        });

    });

});

document.querySelector('.submit-btn')
.addEventListener('click',()=>{

    document.querySelector('.submit-btn')
    .innerHTML = "Review Submitted ✓";

});

</script>

</body>
</html>
