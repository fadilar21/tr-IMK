    <section class="splash-screen">

        <!-- Background -->

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Content -->
        <div class="container h-100">

            <div class="row h-100 justify-content-center align-items-center">

                <div class="col-lg-8 text-center content">

                    <img src="logo.png" class="logo img-fluid" alt="Logo">

                    <h1 class="title">

                    <p class="subtitle">

            </div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// Splash Screen
const splash = document.querySelector(".content");
const button = document.querySelector(".btn-start");

function goToHome(){

    splash.classList.add("fade-out");

    setTimeout(()=>{

        // Nanti ganti ke section Home
        // atau home.html
        window.location.href="home.html";

    },800);

}

button.addEventListener("click",goToHome);

setTimeout(()=>{

    goToHome();

},4000);


// Glow Button

button.addEventListener("mouseenter",()=>{

    button.style.boxShadow="0 0 25px #8B46FF";

});

button.addEventListener("mouseleave",()=>{

    button.style.boxShadow="0 0 15px rgba(145,84,255,.4)";

});

</script>

</body>
